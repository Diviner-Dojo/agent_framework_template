name: agentic_journal
description: "AI-powered journaling app with offline-first architecture"
publish_to: 'none'
version: 0.29.0+27

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management — modern, testable, explicit dependency injection
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database — type-safe SQL, leverages developer's SQL expertise
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28

  # UUID generation — client-side IDs for offline-first
  uuid: ^4.5.1

  # Timezone detection
  flutter_timezone: ^3.0.1

  # HTTP client — interceptors for auth, retry, logging
  dio: ^5.7.0

  # Connectivity detection — online/offline state for LLM fallback
  connectivity_plus: ^6.1.1

  # Supabase client — auth, database, realtime (Phase 4: cloud sync)
  supabase_flutter: ^2.8.0

  # Secure storage — token persistence (used by supabase_flutter internally)
  flutter_secure_storage: ^9.2.0

  # App version info (Phase 14 — ADR-0027)
  package_info_plus: ^8.1.2

  # Core Flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.4

  # Voice (Phase 7A — ADR-0015, Phase 12B — ADR-0022)
  sherpa_onnx: ^1.12.25
  record: ^6.2.0
  flutter_tts: ^4.2.5
  crypto: ^3.0.6
  speech_to_text: ^7.0.0
  just_audio: ^0.9.0

  # Local LLM inference (Phase 8B — ADR-0017)
  llamadart: 0.6.2

  # Photo capture (Phase 9 — ADR-0018)
  image_picker: ^1.1.0
  image: ^4.5.0

  # Location awareness (Phase 10 — ADR-0019)
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Google Calendar integration (Phase 11 — ADR-0020)
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13

  # Video capture (Phase 12 — ADR-0021)
  video_player: ^2.9.1
  video_thumbnail: ^0.5.3
  ffmpeg_kit_min_gpl: ^6.0.3

  # Local notifications — OS-level timed reminders (ADR-0033)
  flutter_local_notifications: ^18.0.1

  googleapis_auth: any
  fl_chart: ^1.1.1
  timezone: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # drift code generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.14

  # Riverpod code generation
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

  # Testing utilities
  mockito: ^5.4.5

  path_provider_platform_interface: any
  plugin_platform_interface: any
flutter:
  uses-material-design: true
  assets:
    - assets/audio/
