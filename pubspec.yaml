name: agentic_journal
description: "AI-powered journaling app with offline-first architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management — modern, testable, explicit dependency injection
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database — type-safe SQL, leverages developer's SQL expertise
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28

  # UUID generation — client-side IDs for offline-first
  uuid: ^4.5.1

  # Timezone detection
  flutter_timezone: ^3.0.1

  # Core Flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # drift code generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.14

  # Riverpod code generation
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

  # Testing utilities
  mockito: ^5.4.5

flutter:
  uses-material-design: true
